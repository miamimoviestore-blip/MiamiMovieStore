<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MiamiMovieStore</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial, sans-serif;

}

body{

background:#0b0b0b;

color:white;

}

/* HEADER */

header{

background:#111;

padding:15px 30px;

display:flex;

justify-content:space-between;

align-items:center;

position:sticky;

top:0;

z-index:1000;

border-bottom:2px solid #e50914;

}

.logo{

font-size:28px;

font-weight:bold;

color:#e50914;

}

nav a{

color:white;

text-decoration:none;

margin-left:20px;

font-size:15px;

transition:0.3s;

}

nav a:hover{

color:#e50914;

}

/* HERO */

.hero{

height:70vh;

background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop') center/cover;

display:flex;

align-items:center;

padding:50px;

position:relative;

}

.hero::before{

content:'';

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,0.6);

}

.hero-content{

position:relative;

z-index:2;

max-width:600px;

}

.hero h1{

font-size:55px;

margin-bottom:20px;

}

.hero p{

font-size:18px;

line-height:1.6;

margin-bottom:25px;

}

.hero button{

padding:14px 30px;

border:none;

background:#e50914;

color:white;

font-size:16px;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}

/* SEARCH */

.search-box{

padding:25px;

text-align:center;

}

.search-box input{

width:85%;

max-width:700px;

padding:15px;

border:none;

border-radius:10px;

font-size:16px;

outline:none;

}

/* MOVIES */

.section-title{

padding-left:25px;

font-size:28px;

margin-top:10px;

margin-bottom:20px;

}

.movies{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:25px;

padding:25px;

}

.movie-card{

background:#181818;

border-radius:12px;

overflow:hidden;

transition:0.3s;

box-shadow:0 0 10px rgba(0,0,0,0.4);

}

.movie-card:hover{

transform:translateY(-8px);

}

.movie-card img{

width:100%;

height:330px;

object-fit:cover;

}

.movie-info{

padding:15px;

}

.movie-info h2{

margin-bottom:15px;

font-size:22px;

}

.buttons{

display:flex;

gap:10px;

}

.buttons a{

flex:1;

}

.buttons button{

width:100%;

padding:12px;

border:none;

border-radius:8px;

font-weight:bold;

cursor:pointer;

font-size:14px;

}

.watch{

background:#e50914;

color:white;

}

.download{

background:white;

color:black;

}

/* FOOTER */

footer{

background:#111;

padding:25px;

text-align:center;

margin-top:40px;

color:#999;

font-size:14px;

}

@media(max-width:768px){

.hero{

height:60vh;

padding:25px;

}

.hero h1{

font-size:35px;

}

.hero p{

font-size:15px;

}

nav{

display:none;

}

}

</style>

</head>

<body>

<header>

<div class="logo">MIAMIMOVIESTORE</div>

<nav>

<a href="#">Home</a>

<a href="#">Movies</a>

<a href="#">Series</a>

<a href="#">Trending</a>

</nav>

</header>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>Unlimited Movies, Series & Downloads</h1>

<p>

Watch the latest movies online or download instantly in HD quality only on MiamiMovieStore.

</p>

<button>WATCH NOW</button>

</div>

</section>

<!-- SEARCH -->

<div class="search-box">

<input type="text" id="searchInput" placeholder="Search movies...">

</div>

<h2 class="section-title">Trending Movies</h2>

<!-- MOVIES -->

<div class="movies" id="movieList">

<!-- MOVIE 1 -->

<div class="movie-card">

<img src="https://image.tmdb.org/t/p/w500/fiVW06jE7z9YnO4trhaMEdclSiC.jpg">

<div class="movie-info">

<h2>Fast X</h2>

<div class="buttons">

<a href="https://example.com/watch" target="_blank">

<button class="watch">WATCH</button>

</a>

<a href="https://example.com/download">

<button class="download">DOWNLOAD</button>

</a>

</div>

</div>

</div>

<!-- MOVIE 2 -->

<div class="movie-card">

<img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg">

<div class="movie-info">

<h2>John Wick 4</h2>

<div class="buttons">

<a href="https://example.com/watch" target="_blank">

<button class="watch">WATCH</button>

</a>

<a href="https://example.com/download">

<button class="download">DOWNLOAD</button>

</a>

</div>

</div>

</div>

<!-- MOVIE 3 -->

<div class="movie-card">

<img src="https://image.tmdb.org/t/p/w500/8rpDcsfLJypbO6vREc0547VKqEv.jpg">

<div class="movie-info">

<h2>Avatar 2</h2>

<div class="buttons">

<a href="https://example.com/watch" target="_blank">

<button class="watch">WATCH</button>

</a>

<a href="https://example.com/download">

<button class="download">DOWNLOAD</button>

</a>

</div>

</div>

</div>

</div>

<!-- FOOTER -->

<footer>

© 2026 MiamiMovieStore — All Rights Reserved

</footer>

<!-- SEARCH SCRIPT -->

<script>

const searchInput = document.getElementById("searchInput");

const movieCards = document.querySelectorAll(".movie-card");

searchInput.addEventListener("keyup", function(){

const value = searchInput.value.toLowerCase();

movieCards.forEach(card => {

const title = card.querySelector("h2").textContent.toLowerCase();

if(title.includes(value)){

card.style.display = "block";

}else{

card.style.display = "none";

}

});

});

</script>

</body>

</html>
