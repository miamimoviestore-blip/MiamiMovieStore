<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MiamiMovieStore</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#000;

color:white;

}

/* NAVBAR */

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 40px;

background:#000;

position:sticky;

top:0;

z-index:1000;

border-bottom:2px solid #e50914;

}

.logo img{

height:60px;

}

nav a{

color:white;

text-decoration:none;

margin:0 18px;

font-size:17px;

transition:.3s;

}

nav a:hover{

color:#e50914;

}

/* HERO */

.hero{

height:90vh;

background:

linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.3)),

url('movie4.jpg');

background-size:cover;

background-position:center;

display:flex;

align-items:center;

padding:60px;

}

.hero-content{

max-width:650px;

}

.hero h1{

font-size:75px;

margin-bottom:20px;

}

.hero p{

font-size:20px;

line-height:1.6;

margin-bottom:30px;

}

.hero-buttons{

display:flex;

gap:15px;

}

.hero-buttons button{

padding:15px 35px;

border:none;

font-size:17px;

font-weight:bold;

border-radius:8px;

cursor:pointer;

transition:.3s;

}

.watch-btn{

background:#e50914;

color:white;

}

.download-btn{

background:#222;

color:white;

border:1px solid #555;

}

.watch-btn:hover,

.download-btn:hover{

transform:scale(1.05);

}

/* SEARCH */

.search-box{

padding:30px;

text-align:center;

}

.search-box input{

width:85%;

max-width:700px;

padding:15px;

border:none;

border-radius:10px;

font-size:16px;

outline:none;

}

/* SECTION */

.section{

padding:20px 40px;

}

.section h2{

margin-bottom:25px;

font-size:32px;

}

/* MOVIES */

.movies{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}

.movie-card{

background:#111;

border-radius:12px;

overflow:hidden;

transition:.3s;

box-shadow:0 0 10px rgba(0,0,0,0.5);

}

.movie-card:hover{

transform:scale(1.05);

}

.movie-card img{

width:100%;

height:320px;

object-fit:cover;

}

.movie-info{

padding:15px;

}

.movie-title{

font-size:22px;

font-weight:bold;

margin-bottom:15px;

}

.buttons{

display:flex;

gap:10px;

}

.buttons a{

flex:1;

}

.buttons button{

width:100%;

padding:12px;

border:none;

border-radius:8px;

font-weight:bold;

cursor:pointer;

font-size:15px;

}

.watch{

background:#e50914;

color:white;

}

.download{

background:white;

color:black;

}

/* LOCATION */

.location{

padding:20px 40px;

font-size:18px;

color:#ccc;

}

/* WHATSAPP */

.whatsapp{

position:fixed;

bottom:20px;

right:20px;

background:#25D366;

color:white;

width:65px;

height:65px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

font-size:32px;

text-decoration:none;

box-shadow:0 0 15px rgba(0,0,0,0.5);

z-index:1000;

}

/* FOOTER */

footer{

padding:30px;

text-align:center;

color:#888;

margin-top:40px;

border-top:1px solid #222;

}

/* MOBILE */

@media(max-width:768px){

.hero{

height:70vh;

padding:25px;

}

.hero h1{

font-size:42px;

}

.hero p{

font-size:16px;

}

nav{

display:none;

}

.movies{

grid-template-columns:repeat(2,1fr);

}

}

</style>

</head>
